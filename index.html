<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shinken · 真剣</title>
    <meta name="description" content="Shinken is a focus timer. Privacy policy and terms of service are linked below." />
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15171b" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
      :root {
        --bg: #fafaf7;
        --surface: #ffffff;
        --ink: #1a1a1a;
        --ink-subtle: #6b6b6b;
        --ink-faint: #a8a8a8;
        --divider: #e8e6e0;
        --accent: #3d5a80;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #15171b;
          --surface: #1e2025;
          --ink: #eeebe3;
          --ink-subtle: #9b9890;
          --ink-faint: #5c5a55;
          --divider: #2c2d32;
          --accent: #8aa8cc;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 17px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; text-underline-offset: 3px; }

      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 96px 24px 48px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .enso-wrap {
        position: relative;
        width: 140px;
        height: 140px;
        margin-bottom: 24px;
        color: var(--ink);
      }
      .enso-wrap svg {
        position: absolute;
        inset: 0;
        opacity: 0.22;
        animation: breathe 8s ease-in-out infinite;
      }
      .enso-wrap .wordmark {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        font-weight: 300;
        letter-spacing: -0.5px;
        color: var(--ink);
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.04); }
      }

      .kicker {
        font-size: 12px;
        color: var(--ink-faint);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin: 0 0 12px;
      }
      .tagline {
        font-size: 17px;
        color: var(--ink-subtle);
        line-height: 1.55;
        margin: 0 0 56px;
        max-width: 420px;
      }

      .link-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 340px;
      }
      .link-list a {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        border-radius: 12px;
        border: 1px solid var(--divider);
        background: var(--surface);
        color: var(--ink);
        font-weight: 500;
        transition: background 120ms ease;
      }
      .link-list a:hover {
        background: var(--divider);
        text-decoration: none;
      }
      .link-list .chev {
        color: var(--ink-faint);
        font-weight: 300;
      }

      footer {
        margin-top: auto;
        padding-top: 64px;
        font-size: 13px;
        color: var(--ink-faint);
      }
      footer a {
        color: var(--ink-subtle);
      }

      @media (max-width: 480px) {
        main { padding: 64px 20px 32px; }
        .enso-wrap { width: 120px; height: 120px; }
        .enso-wrap .wordmark { font-size: 30px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="enso-wrap" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g transform="rotate(30 50 50)">
            <circle
              cx="50"
              cy="50"
              r="42"
              fill="none"
              stroke="currentColor"
              stroke-width="6"
              stroke-linecap="round"
              stroke-dasharray="222 42"
            />
          </g>
        </svg>
        <div class="wordmark">Shinken</div>
      </div>

      <p class="kicker">Shinken · 真剣</p>
      <p class="tagline">
        A focus timer for one earnest hour at a time.
      </p>

      <nav class="link-list">
        <a href="privacy.html">
          <span>Privacy Policy</span>
          <span class="chev" aria-hidden="true">→</span>
        </a>
        <a href="terms.html">
          <span>Terms of Service</span>
          <span class="chev" aria-hidden="true">→</span>
        </a>
        <a href="mailto:hello@shinkenfocus.app">
          <span>Contact</span>
          <span class="chev" aria-hidden="true">→</span>
        </a>
      </nav>

      <footer>
        <p>© Shinken. All rights reserved.</p>
      </footer>
    </main>
  </body>
</html>
